<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--table -> tabela
        tr -> linha
        td -> célula 
        th-> cabeçalho-->
    <table border="1">
        <tr>
            <th colspan="3">Produto</th>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>R$ 2.500,00</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Tablet</td>
            <td>R$ 1.200,00</td>
            <td>5</td>
        </tr>

        <!--colspan -> extensao da coluna
            rowspan-> extensao da linha-->
            <tr>
                <td rowspan="2">Desconto</td>
                <td colspan="2">10% de desconto</td>
            </tr>
        <tr>
            <td colspan="2">15% de desconto</td>
        </tr>

            
    </table>
</body>
</html>
