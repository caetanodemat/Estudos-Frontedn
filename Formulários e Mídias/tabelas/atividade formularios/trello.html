<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->
      <script src="https://unpkg.com/@codans/trello"></script>
</head>
<body>

  <img src="/Formulários e Mídias/tabelas/atividade formularios/img/trello.svg width="200">

  <h1>Fazer login no Trello</h1>

  <form action="" method="get">

        <input type="text" name="email" placeholder="Insira seu e-mail">
        <input type="password" name="senha" placeholder="Digite sua senha">
        <input type="submit" value="Fazer login">

        <span>Ou</span>

        <button>
            <img src="/Formulários e Mídias/tabelas/atividade formularios/img/google.svg" width="20" alt="Google"> Continuar com Google
        </button>
        <button type="submit">
            <img src="/Formulários e Mídias/tabelas/atividade formularios/img/microsoft.svg" width="20" alt="Microsoft"> Continuar com Microsoft
        </button>
        <button type="submit">
            <img src="/Formulários e Mídias/tabelas/atividade formularios/img/apple.svg" width="20" alt="Apple"> Continuar com Apple
        </button>
        <button type="submit">
            <img src="/Formulários e Mídias/tabelas/atividade formularios/img/slack.svg" width="20" alt="Slack"> Continuar com Slack
        </button>
  </form>

    <img src="/Formulários e Mídias/tabelas/atividade formularios/img/atlassian.svg" width="200" alt="Atlassian">
    <img src="/Formulários e Mídias/tabelas/atividade formularios/img/analytics.svg" width="200" alt="Analytics">
    <img src="/Formulários e Mídias/tabelas/atividade formularios/img/interactive.svg" width="200" alt="Interactive">
</body>
</html>
